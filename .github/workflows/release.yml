name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release version
        run: node scripts/set-release-version.js "$GITHUB_REF_NAME" src/meta.txt

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate artifact version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT_VERSION=$(awk '/@version/{print $3; exit}' dist/Zhihu-Enhanced.user.js)
          if [ "$TAG_VERSION" != "$ARTIFACT_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != artifact version ($ARTIFACT_VERSION)"
            exit 1
          fi
          echo "Artifact version validated: $TAG_VERSION"

      - name: Validate tagged artifact
        run: |
          if ! cmp -s Zhihu-Enhanced.user.js dist/Zhihu-Enhanced.user.js; then
            echo "ERROR: Tagged artifact does not match the CI build"
            exit 1
          fi
          echo "Tagged artifact matches the CI build"

      - name: Ensure release does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "ERROR: Release $GITHUB_REF_NAME already exists"
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/Zhihu-Enhanced.user.js
          generate_release_notes: true
