name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          META_VERSION=$(awk '/@version/{print $3; exit}' src/meta.txt)
          if [ "$TAG_VERSION" != "$META_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != meta.txt version ($META_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Commit built file to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/Zhihu-Enhanced.user.js
          if git diff --cached --quiet; then
            echo "Build output is already up to date"
          else
            git commit -m "build: ${GITHUB_REF_NAME}"
            git push origin main
          fi

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/Zhihu-Enhanced.user.js
          generate_release_notes: true
